<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240" width="760" height="240" role="img" aria-labelledby="title desc">
  <title id="title">loophole bridge</title>
  <desc id="desc">loophole bridge, an MCP server for Ableton Live that runs inside Live's Extension Host on the official Extensions SDK.</desc>

  <!-- self-contained dark panel so the banner reads identically in GitHub light and dark themes -->
  <rect x="0" y="0" width="760" height="240" rx="18" fill="#0B0E14"/>
  <rect x="0.75" y="0.75" width="758.5" height="238.5" rx="17.25" fill="none" stroke="#1F2630" stroke-width="1.5"/>

  <!-- logomark: an open ring, a loop with a way through (shared across the family) -->
  <g transform="translate(118 120)">
    <circle r="44" fill="none" stroke="#E9A23B" stroke-width="13" stroke-linecap="round"
            stroke-dasharray="214 63" stroke-dashoffset="-31" transform="rotate(-128)"/>
    <circle r="7.5" fill="#E9A23B"/>
  </g>

  <!-- wordmark: "loophole" primary, suffix muted (no per-package amber; amber stays in the logomark) -->
  <text x="202" y="128" font-family="'Inter','Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif"
        font-size="72" font-weight="700" letter-spacing="-1.5"><tspan fill="#E6EAF0">loophole </tspan><tspan fill="#8A93A3">bridge</tspan></text>

  <!-- tagline -->
  <text x="204" y="162" font-family="'Inter','Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif"
        font-size="22" font-weight="500" fill="#8A93A3">an MCP server for Ableton Live</text>
</svg>
