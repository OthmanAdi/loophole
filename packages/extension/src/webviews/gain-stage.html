<!doctype html>
<html lang="en">
  <!--
    Gain Stage Doctor modal (W3), 03_EXTENSIONS_SPEC §3(c).

    A table, one row per selected audio track, with a per-row checkbox (so a track can
    be skipped) and a single target dropdown (-18 / -20 / -12 dBFS RMS, default -18).
    Apply returns `{ targetDb, applyTrackIds }` via `close_and_send`; Cancel returns
    `{ targetDb: null, applyTrackIds: [] }`.

    NOTE (RING-3): the core `runGainStageDoctor` handler measures AND writes in one
    call with the target chosen up front, so this modal selects the target and the
    track subset BEFORE the render (the handler then renders + measures + trims that
    subset inside a progress dialog). The measured peak/RMS/crest table from
    03_EXTENSIONS_SPEC §3(c) is shown AFTER the run, in a second info modal, since the
    one-shot handler cannot pause between measure and apply. The host injects the track
    list by replacing `/*__LOOPHOLE_DATA__*/{}` with
    `{ tracks: [{ id, name }], targets: [-18,-20,-12] }`. Both postMessage paths ship.
  -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gain Stage</title>
    <script>
      const LOOPHOLE = /*__LOOPHOLE_DATA__*/ {};

      const isWebKit =
        window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.live;
      const isWebView2 = window.chrome && window.chrome.webview;

      function doSendMessage(message) {
        if (isWebKit) {
          window.webkit.messageHandlers.live.postMessage(message);
        } else if (isWebView2) {
          window.chrome.webview.postMessage(message);
        }
      }

      function closeWithResult(result) {
        doSendMessage({ method: 'close_and_send', params: [JSON.stringify(result)] });
      }

      function apply() {
        const targetDb = Number(document.getElementById('target').value);
        const applyTrackIds = Array.from(
          document.querySelectorAll('input[data-track]:checked'),
        ).map((el) => el.getAttribute('data-track'));
        closeWithResult({ targetDb, applyTrackIds });
      }

      function cancel() {
        closeWithResult({ targetDb: null, applyTrackIds: [] });
      }

      document.addEventListener('DOMContentLoaded', () => {
        const tracks = Array.isArray(LOOPHOLE.tracks) ? LOOPHOLE.tracks : [];
        const targets = Array.isArray(LOOPHOLE.targets) ? LOOPHOLE.targets : [-18, -20, -12];
        const select = document.getElementById('target');
        for (const t of targets) {
          const opt = document.createElement('option');
          opt.value = String(t);
          opt.textContent = String(t) + ' dBFS RMS';
          if (Number(t) === -18) opt.selected = true;
          select.appendChild(opt);
        }
        const tbody = document.getElementById('rows');
        if (tracks.length === 0) {
          const tr = document.createElement('tr');
          const td = document.createElement('td');
          td.colSpan = 2;
          td.className = 'empty';
          td.textContent = 'No audio tracks in the selection.';
          tr.appendChild(td);
          tbody.appendChild(tr);
        }
        for (const track of tracks) {
          const tr = document.createElement('tr');
          const tdCheck = document.createElement('td');
          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = true;
          cb.setAttribute('data-track', track.id);
          tdCheck.appendChild(cb);
          const tdName = document.createElement('td');
          tdName.textContent = track.name;
          tr.appendChild(tdCheck);
          tr.appendChild(tdName);
          tbody.appendChild(tr);
        }
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') apply();
          if (e.key === 'Escape') cancel();
        });
      });
    </script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      *:not(dialog) {
        margin: 0;
      }
      input,
      button,
      select {
        font: inherit;
      }
      :root {
        --p-live-ui-bg: hsl(0, 0%, 21%);
        --p-live-control-bg: hsl(0, 0%, 16%);
        --p-live-input-bg: hsl(0, 0%, 12%);
        --p-live-text-primary: hsl(0, 0%, 71%);
        --p-live-control-border: hsl(0, 0%, 7%);
        --p-live-text-secondary: hsl(0, 0%, 41%);
        --p-live-accent-primary: hsl(31, 100%, 67%);
        --p-live-control-text--enabled: hsl(0, 0%, 7%);
        --c-bg--0500: oklch(from var(--p-live-ui-bg) l c h);
        --c-text-primary: oklch(from var(--p-live-text-primary) l c h);
        --c-text-secondary: oklch(from var(--p-live-text-secondary) l c h);
        --c-control-bg--400: oklch(from var(--p-live-control-bg) calc(l * 0.9) c h);
        --c-control-bg--500: oklch(from var(--p-live-control-bg) l c h);
        --c-control-border: oklch(from var(--p-live-control-border) l c h);
        --c-control-outline: var(--c-text-secondary);
        --c-control-on-foreground: oklch(from var(--p-live-control-text--enabled) l c h);
        --c-input-bg-500: oklch(from var(--p-live-input-bg) l c h);
        --c-highlight--primary: oklch(from var(--p-live-accent-primary) l c h);
      }
      html {
        background-color: var(--c-bg--0500);
        color: var(--c-text-primary);
        font-family: 'AbletonSansSmall', sans-serif;
        font-size: 11.5px;
        font-weight: 500;
        -webkit-font-smoothing: antialiased;
        height: 100%;
      }
      body {
        height: 100%;
        padding: 1.25em;
        display: flex;
        flex-direction: column;
        gap: 0.75em;
      }
      .title {
        font-size: 1.1rem;
      }
      .target-row {
        display: flex;
        align-items: center;
        gap: 0.5em;
      }
      select {
        background-color: var(--c-input-bg-500);
        color: var(--c-text-primary);
        border: 1px solid var(--c-control-border);
        height: 22px;
        padding: 0 0.33em;
      }
      .table-wrap {
        flex: 1;
        overflow: auto;
        border: 1px solid var(--c-control-border);
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        text-align: left;
        padding: 0.3em 0.5em;
        border-bottom: 1px solid var(--c-control-border);
      }
      th {
        color: var(--c-text-secondary);
        position: sticky;
        top: 0;
        background-color: var(--c-control-bg--500);
      }
      td.empty {
        color: var(--c-text-secondary);
        text-align: center;
        padding: 1em;
      }
      .buttons {
        display: flex;
        gap: 0.5em;
        justify-content: flex-end;
      }
      .alx-button {
        font-size: 1rem;
        line-height: 1;
        background-color: var(--c-control-bg--500);
        color: var(--c-text-primary);
        border: 1px solid var(--c-control-border);
        height: 22px;
        padding: 0 1em;
        border-radius: 1em;
        cursor: pointer;
        user-select: none;
        white-space: nowrap;
      }
      .alx-button:hover {
        background-color: var(--c-control-bg--400);
      }
      .alx-button:active {
        color: var(--c-control-on-foreground);
        background-color: var(--c-highlight--primary);
      }
      .alx-button:focus {
        outline: 2px solid var(--c-control-outline);
      }
    </style>
  </head>
  <body>
    <div class="title">Gain Stage</div>
    <div class="target-row">
      <label for="target">Target</label>
      <select id="target"></select>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Stage</th>
            <th>Track</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <div class="buttons">
      <button class="alx-button" onclick="cancel()">Cancel</button>
      <button class="alx-button" onclick="apply()">Apply trims</button>
    </div>
  </body>
</html>
