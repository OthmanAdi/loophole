name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      # pnpm-lock.yaml is committed (supply-chain policy), so installs are
      # reproducible: --frozen-lockfile fails if the lockfile is out of date
      # rather than silently rewriting it. --ignore-scripts is the standing
      # supply-chain policy (Shai-Hulud).
      - name: Install
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      - name: Format check
        run: pnpm format:check

      - name: Test (coverage)
        run: pnpm -r test -- --coverage

      - name: Build
        run: pnpm -r build
